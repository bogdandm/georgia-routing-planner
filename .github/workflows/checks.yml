name: Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
        env:
          BASE_PATH: /georgia-routing-planner/
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm e2e
      - name: Build deployable Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: pnpm build:app
        env:
          BASE_PATH: /georgia-routing-planner/
      - name: Upload deployable Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: pages-dist-${{ github.sha }}
          path: dist
          if-no-files-found: error
          retention-days: 1
      - name: Upload browser failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
